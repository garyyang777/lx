<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport"content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/><title>学生离校登记表for nenuist</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background-color:#f3f4f6;color:#374151;line-height:1.5;padding:20px 10px}body *{font-family:"Segoe UI",PingFang SC,-apple-system,BlinkMacSystemFont,Roboto,"Helvetica Neue",Arial,sans-serif!important}.container{max-width:600px;margin:0 auto;background-color:#ffffff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.05);padding:30px 25px}h2.form-title{text-align:center;font-size:22px;color:#111827;margin-bottom:25px;font-weight:600}.section-title{font-size:16px;color:#3b82f6;border-bottom:2px solid#eff6ff;padding-bottom:8px;margin:25px 0 15px 0;font-weight:600}.form-group{margin-bottom:16px}.form-group label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:#4b5563}input[type="text"]{width:100%;padding:10px 12px;font-size:16px;border:1px solid#d1d5db;border-radius:8px;background-color:#f9fafb;transition:all 0.3s ease;color:#111827}input[type="text"]:focus{outline:none;border-color:#3b82f6;background-color:#ffffff;box-shadow:0 0 0 3px rgba(59,130,246,0.2)}.input-row{display:flex;align-items:center;gap:8px}.input-row input[type="text"]{flex:1;min-width:0;text-align:center;padding:10px 4px}.input-row span{font-size:14px;color:#6b7280;white-space:nowrap}button[type="submit"]{width:100%;background-color:#3b82f6;color:#ffffff;border:none;padding:14px;font-size:16px;font-weight:600;border-radius:8px;cursor:pointer;margin-top:30px;transition:background-color 0.3s ease,transform 0.1s ease}button[type="submit"]:hover{background-color:#2563eb}button[type="submit"]:active{transform:scale(0.98)}@media(min-width:500px){.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-2 .form-group{margin-bottom:0}}</style></head><body><div class="container"><h2 class="form-title">学生离校登记表for nenuist</h2><div class="form-group"><label>使用说明：<br/>1.仅用于生成东师信科《学生离校登记表》电子版预览。<br/>2.生成的表不支持保存为图片或文档，如需使用请自行截图后提交。<br/>3.所有数据均在本地处理，本项目不会存储和共享您填写的任何内容。<br/>4.一次生成对应一次预览，关闭生成结果页面后信息即焚。</label></div><form id="submit_info"novalidate><div class="section-title">个人信息</div><div class="grid-2"><div class="form-group"><label for="name">姓名</label><input type="text"id="name"required/></div><div class="form-group"><label for="studentId">学号</label><input type="text"id="studentId"required/></div><div class="form-group"><label for="major">专业</label><input type="text"id="major"required/></div><div class="form-group"><label for="phone">手机号</label><input type="text"id="phone"required/></div></div><div class="section-title">时间登记</div><div class="form-group"><label>离校日期</label><div class="input-row"><input type="text"id="leaveYear"required/><span>年</span><input type="text"id="leaveMonth"required/><span>月</span><input type="text"id="leaveDay"required/><span>日</span><input type="text"id="leaveHour"required/><span>点</span></div></div><div class="form-group"><label>返校日期</label><div class="input-row"><input type="text"id="backYear"required/><span>年</span><input type="text"id="backMonth"required/><span>月</span><input type="text"id="backDay"required/><span>日</span><input type="text"id="backHour"required/><span>点</span></div></div><div class="section-title">行程明细</div><div class="form-group"><label>去往何处</label><div class="input-row"><input type="text"id="province"required/><span>省</span><input type="text"id="city"required/><span>市</span><input type="text"id="district"required/><span>区</span></div></div><div class="form-group"><label for="reason">离校原因</label><input type="text"id="reason"required/></div><div class="grid-2"><div class="form-group"><label for="departureTransport">离校交通车次</label><input type="text"id="departureTransport"required/></div><div class="form-group"><label for="returnTransport">返校交通车次</label><input type="text"id="returnTransport"required/></div></div><div class="section-title">紧急联系</div><div class="form-group"><label for="contactName">本人与离校联系人的关系</label><input type="text"id="contactName"required/></div><div class="form-group"><label for="contactPhone">离校第一联系人电话</label><input type="text"id="contactPhone"required/></div><button type="submit">生成电子版预览</button></form></div><script type="text/javascript">document.getElementById("submit_info").addEventListener("submit",function(event){event.preventDefault();const formData={na:document.getElementById("name").value.trim(),nm:document.getElementById("major").value.trim(),nd:document.getElementById("studentId").value.trim(),np:document.getElementById("phone").value.trim(),ly:document.getElementById("leaveYear").value.trim(),li:document.getElementById("leaveMonth").value.trim(),lr:document.getElementById("leaveDay").value.trim(),ld:document.getElementById("leaveHour").value.trim(),fy:document.getElementById("backYear").value.trim(),fi:document.getElementById("backMonth").value.trim(),fr:document.getElementById("backDay").value.trim(),fd:document.getElementById("backHour").value.trim(),wp:document.getElementById("province").value.trim(),ws:document.getElementById("city").value.trim(),wq:document.getElementById("district").value.trim(),gy:document.getElementById("reason").value.trim(),lc:document.getElementById("departureTransport").value.trim(),fc:document.getElementById("returnTransport").value.trim(),xg:document.getElementById("contactName").value.trim(),xd:document.getElementById("contactPhone").value.trim()};const isAllFilled=Object.values(formData).every(value=>value!=="");if(isAllFilled){sessionStorage.setItem("pdfData990983",JSON.stringify(formData));window.location.href="viewer"}else{alert("有未填的信息，请检查")}});</script></body></html>
